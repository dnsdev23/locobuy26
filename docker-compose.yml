version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: locobuy_postgres
    restart: always
    environment:
      POSTGRES_DB: locobuy
      POSTGRES_USER: locobuy_user
      POSTGRES_PASSWORD: locobuy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locobuy_user -d locobuy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: locobuy_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
